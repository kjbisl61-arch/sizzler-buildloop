<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jarvis — Build Review Loop</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#0A0E1A;color:#E8F4FD;min-height:100vh}
.header{background:linear-gradient(135deg,#0A2A4A,#0A0E1A);padding:10px 16px;border-bottom:1px solid #1E3A5F;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header-left{display:flex;align-items:center;gap:12px}
.back-btn{background:#111827;border:1px solid #1E3A5F;color:#00D4FF;padding:5px 12px;border-radius:6px;font-size:.72rem;font-weight:700;text-decoration:none;white-space:nowrap}
.back-btn:hover{background:#00D4FF;color:#0A0E1A}
.header h1{font-size:1rem;font-weight:700;color:#00D4FF}
.header p{font-size:.72rem;color:#8899AA;font-style:italic}
.hbtn{background:#111827;border:1px solid #1E3A5F;color:#00FF88;padding:5px 12px;border-radius:6px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:inherit}
.hbtn:hover{background:#00FF88;color:#0A0E1A}
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:8px 16px;background:#111827;border-bottom:1px solid #1E3A5F}
.leg-item{display:flex;align-items:center;gap:5px;font-size:.68rem;color:#8899AA}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.wrap{max-width:760px;margin:0 auto;padding:24px 16px 40px}
.node{cursor:pointer}
.node:hover rect,.node:hover polygon{filter:brightness(1.25)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-box{background:#111827;border:1px solid #1E3A5F;border-radius:12px;padding:22px 24px;max-width:520px;width:92%;position:relative;max-height:82vh;overflow-y:auto}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:#8899AA;font-size:1.2rem;cursor:pointer}
.modal-title{font-size:1.05rem;font-weight:700;margin-bottom:14px}
.msec{margin-bottom:12px}
.mlabel{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:#8899AA;margin-bottom:4px}
.mtext{font-size:.82rem;line-height:1.6;color:#E8F4FD}
.mtext.ex{color:#F4A261}
</style>
</head>
<body>
<div class="header">
<div class="header-left">
<a href="https://sizzler-controlcentre.vercel.app/" class="back-btn">&larr; Control Centre</a>
<div><h1>Build Review Loop</h1><p>Jarvis — Sizzler Build OS · reference tool · click any step</p></div>
</div>
<button class="hbtn" onclick="showCompletion()">Definition of Complete</button>
</div>
<div class="legend">
<div class="leg-item"><div class="leg-dot" style="background:#00D4FF"></div>Process</div>
<div class="leg-item"><div class="leg-dot" style="background:#FFD700"></div>Decision</div>
<div class="leg-item"><div class="leg-dot" style="background:#00FF88"></div>Documentation</div>
<div class="leg-item"><div class="leg-dot" style="background:#FF6B6B"></div>Flag / exception</div>
</div>

<div class="wrap">
<svg width="100%" viewBox="0 0 700 960">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5A6B7A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="20" y="20" width="660" height="58" rx="12" fill="none" stroke="#3A506B" stroke-width="1.5" stroke-dasharray="5 4"/>
<text x="350" y="42" text-anchor="middle" font-size="13" font-weight="700" fill="#8899AA">Governing layer — 5 Pillars &amp; 4 Design Principles</text>
<text x="350" y="62" text-anchor="middle" font-size="11" fill="#5A6B7A">Applied continuously — not a step, always active</text>

<line x1="220" y1="178" x2="220" y2="214" stroke="#5A6B7A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="312" y1="263" x2="418" y2="263" stroke="#5A6B7A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="366" y="253" text-anchor="middle" font-size="11" fill="#8899AA">No</text>
<path d="M535 293 L535 320 L220 320 L220 346" fill="none" stroke="#5A6B7A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="220" y1="310" x2="220" y2="346" stroke="#5A6B7A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="232" y="330" font-size="11" fill="#8899AA">Yes</text>
<line x1="220" y1="408" x2="220" y2="444" stroke="#5A6B7A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="220" y1="506" x2="220" y2="542" stroke="#5A6B7A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="312" y1="591" x2="418" y2="591" stroke="#5A6B7A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="366" y="581" text-anchor="middle" font-size="11" fill="#8899AA">No</text>
<line x1="220" y1="638" x2="220" y2="674" stroke="#5A6B7A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="232" y="658" font-size="11" fill="#8899AA">Yes</text>
<path d="M535 621 L535 650 L380 650 L380 378 L350 378" fill="none" stroke="#5A6B7A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="388" y="510" font-size="10" fill="#5A6B7A">revise</text>
<line x1="220" y1="736" x2="220" y2="772" stroke="#5A6B7A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="312" y1="821" x2="418" y2="821" stroke="#5A6B7A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="366" y="811" text-anchor="middle" font-size="11" fill="#8899AA">Yes</text>
<path d="M535 851 L535 880 L220 880 L220 896" fill="none" stroke="#5A6B7A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="220" y1="868" x2="220" y2="896" stroke="#5A6B7A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="232" y="883" font-size="11" fill="#8899AA">No</text>

<g class="node" onclick="showModal(0)">
<rect x="90" y="118" width="260" height="60" rx="8" fill="#0A2A3A" stroke="#00D4FF" stroke-width="1.5"/>
<text x="220" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#00D4FF">1. Open Agent/Unit file</text>
<text x="220" y="159" text-anchor="middle" font-size="11" fill="#8899AA">Start of unit cycle</text>
</g>

<g class="node" onclick="showModal(1)">
<polygon points="220,216 312,263 220,310 128,263" fill="#2A2000" stroke="#FFD700" stroke-width="1.5"/>
<text x="220" y="267" text-anchor="middle" font-size="13" font-weight="700" fill="#FFD700">File exists?</text>
</g>

<g class="node" onclick="showModal(2)">
<rect x="420" y="233" width="230" height="60" rx="8" fill="#0A2A22" stroke="#00FF88" stroke-width="1.5"/>
<text x="535" y="255" text-anchor="middle" font-size="14" font-weight="700" fill="#00FF88">Create + save file</text>
<text x="535" y="274" text-anchor="middle" font-size="11" fill="#8899AA">New unit — no file yet</text>
</g>

<g class="node" onclick="showModal(3)">
<rect x="90" y="346" width="260" height="60" rx="8" fill="#0A2A3A" stroke="#00D4FF" stroke-width="1.5"/>
<text x="220" y="368" text-anchor="middle" font-size="14" font-weight="700" fill="#00D4FF">2. Review SOW / Arch Map</text>
<text x="220" y="387" text-anchor="middle" font-size="11" fill="#8899AA">Both masters, fresh</text>
</g>

<g class="node" onclick="showModal(4)">
<rect x="90" y="444" width="260" height="60" rx="8" fill="#0A2A3A" stroke="#00D4FF" stroke-width="1.5"/>
<text x="220" y="466" text-anchor="middle" font-size="14" font-weight="700" fill="#00D4FF">3. Capture profile + link</text>
<text x="220" y="485" text-anchor="middle" font-size="11" fill="#8899AA">Link tree, connections</text>
</g>

<g class="node" onclick="showModal(5)">
<polygon points="220,544 312,591 220,638 128,591" fill="#2A2000" stroke="#FFD700" stroke-width="1.5"/>
<text x="220" y="587" text-anchor="middle" font-size="12" font-weight="700" fill="#FFD700">4. Passes governing</text>
<text x="220" y="601" text-anchor="middle" font-size="12" font-weight="700" fill="#FFD700">check?</text>
</g>

<g class="node" onclick="showModal(6)">
<rect x="420" y="561" width="230" height="60" rx="8" fill="#2A0A0A" stroke="#FF6B6B" stroke-width="1.5"/>
<text x="535" y="583" text-anchor="middle" font-size="14" font-weight="700" fill="#FF6B6B">Record + revise</text>
<text x="535" y="602" text-anchor="middle" font-size="11" fill="#8899AA">Back to Step 2</text>
</g>

<g class="node" onclick="showModal(7)">
<rect x="90" y="676" width="260" height="60" rx="8" fill="#0A2A22" stroke="#00FF88" stroke-width="1.5"/>
<text x="220" y="698" text-anchor="middle" font-size="14" font-weight="700" fill="#00FF88">5. Update &amp; save file</text>
<text x="220" y="717" text-anchor="middle" font-size="11" fill="#8899AA">Correct folder + naming</text>
</g>

<g class="node" onclick="showModal(8)">
<polygon points="220,774 312,821 220,868 128,821" fill="#2A2000" stroke="#FFD700" stroke-width="1.5"/>
<text x="220" y="825" text-anchor="middle" font-size="13" font-weight="700" fill="#FFD700">Flag raised?</text>
</g>

<g class="node" onclick="showModal(9)">
<rect x="420" y="791" width="230" height="60" rx="8" fill="#2A0A0A" stroke="#FF6B6B" stroke-width="1.5"/>
<text x="535" y="813" text-anchor="middle" font-size="14" font-weight="700" fill="#FF6B6B">Record action</text>
<text x="535" y="832" text-anchor="middle" font-size="11" fill="#8899AA">SOW/Map + Risk Register</text>
</g>

<text x="220" y="918" text-anchor="middle" font-size="12" font-style="italic" fill="#8899AA">&#8635; loops back to Step 1</text>
<text x="220" y="936" text-anchor="middle" font-size="11" font-style="italic" fill="#5A6B7A">Continues until every action is resolved or has a clear path</text>
</svg>
</div>

<div class="modal" id="modal"><div class="modal-box">
<button class="modal-close" onclick="closeModal()">&#x2715;</button>
<div class="modal-title" id="m-title"></div>
<div id="m-body"></div>
</div></div>

<script>
var DATA = [
{t:"1. Open Agent/Unit file", friction:"Assuming a file already exists without checking, and building against a stale mental picture.", action:"Always open or search for the actual unit file first \u2014 confirm by filename and folder before assuming its state.", example:"Knox's own working doc predated today's Map update \u2014 checking the real file first caught the gap."},
{t:"Decision: File exists?", friction:"Skipping this check and building blind, assuming a file exists (or doesn't) without confirming.", action:"Explicit Yes/No branch \u2014 no unit proceeds until this is actually answered, not assumed.", example:"Knox's file existed and was current to Step 2 \u2014 confirmed before Step 4 (Token pattern) began."},
{t:"Create + save file (No branch)", friction:"A new unit gets discussed and referenced without ever getting its own working doc.", action:"Create the working doc immediately from the standard template, and save before continuing to the next step.", example:"ARCH-06 Orchestration will need this the first time its own deep-dive starts."},
{t:"2. Review SOW / Arch Map", friction:"Working from a stale or remembered picture of the SOW and Map instead of checking them directly.", action:"Open and check both master documents fresh at the start of every cycle, not from memory.", example:"Caught the AGT-04 discrepancy this way \u2014 the SOW still showed it as live."},
{t:"3. Capture profile + link", friction:"A unit's link tree gets captured incompletely, or copied from an earlier, outdated version.", action:"Capture every current connection directly from the live Architecture Map, not from a prior working doc.", example:"Knox's 27-row Connections table was rebuilt directly from the current Map, catching the missing LNK-114 row."},
{t:"Decision: Passes governing check?", friction:"Assuming Step 4 always passes and moving straight to save without a real check \u2014 nothing in the old flow accounted for failure.", action:"Explicit Yes/No branch. If the update doesn't hold up against the Five Pillars and Four Principles, it cannot proceed to save.", example:"This is exactly where the Knox Token pattern was tested against the four principles before being trusted across all 27 links."},
{t:"Record + revise (No branch)", friction:"A failed check gets silently retried and the reason for the failure is lost, instead of being treated as real data.", action:"File the failure into the SOW/Arch Map and Risk/Change Register like any other flag, then loop back to Step 2 to revise \u2014 not forward to save.", example:"No case yet in this build \u2014 this branch exists precisely so a future failure has a defined path instead of being handled ad hoc."},
{t:"5. Update & save file", friction:"A file gets updated but saved to the wrong folder, or with a naming pattern that breaks consistency.", action:"Confirm the folder path and naming convention match the SOW's stated location before saving.", example:"Every document from this build filed to sizzlerwaveandroad/Jarvis/Docs, matching its SOW location field exactly."},
{t:"Decision: Flag raised?", friction:"An issue is noticed in passing during the work, but never formally raised as a flag.", action:"Explicit Yes/No branch \u2014 anything uncertain or incomplete must be flagged here, not waved through silently.", example:"Knox's four Token exceptions were all caught and flagged at exactly this point in the cycle."},
{t:"Record action (Yes branch)", friction:"A flag gets mentioned in conversation but never filed anywhere durable \u2014 it exists only as a memory of being said.", action:"File immediately into the SOW/Arch Map and the Risk/Change Register, with a specific re-incorporate trigger attached.", example:"Knox's four exceptions were each filed with their own trigger \u2014 e.g. \u201copens when INT-02's own deep-dive begins.\u201d"}
];
function showModal(i){
var d=DATA[i];
document.getElementById('m-title').textContent=d.t;
var b='<div class="msec"><div class="mlabel">Friction point</div><div class="mtext">'+d.friction+'</div></div>';
b+='<div class="msec"><div class="mlabel">Required action</div><div class="mtext">'+d.action+'</div></div>';
b+='<div class="msec"><div class="mlabel">Real example from this build</div><div class="mtext ex">'+d.example+'</div></div>';
document.getElementById('m-body').innerHTML=b;
document.getElementById('modal').classList.add('open');
}
function showCompletion(){
document.getElementById('m-title').textContent='Definition of "Complete"';
document.getElementById('m-body').innerHTML='<div class="mtext">A full loop cycle is only complete when: the Risk/Change Register shows no open item for this unit; the SOW, Architecture Map, and the unit\'s own working doc all agree with each other; every link row has a real Direction and payload, not TBC; and the Version Log has a dated entry. A unit\'s Overall Status only moves to GREEN when every row in its own working doc is GREEN \u2014 partial completion is not completion.</div>';
document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
</script>
</body>
</html>
